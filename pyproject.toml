[project]
name = "yolo-waste-sorter"
version = "0.1.0"
description = "Fine-tune YOLO11n for six-class waste detection (plastic, paper, cardboard, metal, glass, organic) on white background, deployed via TensorRT on Jetson Orin Nano"
requires-python = ">=3.11"
dependencies = [
    "ultralytics>=8.3,<9",
    "pyyaml>=6,<7",
    "albumentations>=2.0,<3",
]

[project.optional-dependencies]
dev = ["pytest", "mypy", "ruff"]
research = ["numpy", "pandas", "matplotlib", "jupyter"]
# Auto-boxing chain (T3). rembg's BiRefNet session ships in the base package
# (>=2.0.59); the [cpu] extra supplies onnxruntime (swap in onnxruntime-gpu
# for CUDA inference).
boxing = [
    "autodistill>=0.1.29,<0.2",
    "autodistill-grounding-dino>=0.1.4,<0.2",
    "rembg[cpu]>=2.0.59,<3",
]

[tool.ruff]
line-length = 100

[tool.mypy]
strict = true

