          - cell [ref=e35]:
            - heading "Plastic Waste DataBase of Images – WaDaBa" [level=2] [ref=e36]
            - paragraph [ref=e37]: The main purpose of this work was creation of a plastic waste database of images of objects constituting the typical contents of municipal waste. This group of waste can be automatically selected on the belts in waste sorting plant by using methods of Computer Vision. Digital images of items that will be processing should reflect the specific conditions of places where real objects wll be found. Thus, each thing is placed in this database should be presented in the course of several collections of images, taking into account different lighting conditions and different arrangement relative to the image recorder, and the different degree of deformation. Images created in the collection divided into groups based on the type of material from which individual objects were made.
            - text: Recycling is one of the most important methods of environmental protection, the purpose of which is to reduce the amount of waste stored in landfills and conservation of natural resources. The term recycling means the recovery of raw materials, which consists in the transformation of substances or materials contained in waste in the production process to obtain the substance or material for reused or other purposes, including organic recycling, excluding energy recovery. In the last century significantly increased the amount of waste produced. At the same time appeared the possibility of their reuse and one noted that the waste put to landfill are not environmentally neutral. Some of them are extremely durable. For example, the decomposition of cotton material is 5 months, paper tissue - 3 month, aluminium cans - 100 years, plastic bag - 300 years. Taking into consideration the fact that the average man is producing the about 350 kg of waste annually, and that the pace of producing rubbish much is exceeding the pace of their disintegration, creating new garbage dumps is necessary. Here a problem of high building costs and a problem of environmental, social and economic influences appear. Effectively pursued politics of the waste management and re-using them allows us to prolong the operation of the landfill by up to 60\% and reduce the need for new landfills. The recycling should be more widely applied and promoted. However in order to apply the recycling a sorting of waste is necessary on the one can recyclable and on remaining. The establishment of a database of images of objects constituting the typical content of the municipal waste, produced by households, i.e. packages of different kind and everyday articles are a main our goal. Created in the framework of the project public database of waste images, becomes the starting point for research to develop methods for automatic sorting of waste with the use of modern techniques of image processing and recognition. The main motive for the creation of the work was the fact that not developed methods for automatic sorting of waste, using methods of pattern recognition. In search of reasons for this situation, it was noted that, despite the existence of several databases of images of various objects, among them no a database with waste images. Hence emerged the idea of creating a database of waste images. This database will be the basis for testing methods for automatic sorting of waste, and also will allow to compare the effectiveness of various methods. The European Union Directive 2008/98 / WE on waste management and applicable Polish law show that besides prevention of waste generation, the process of waste material recycling should have priority over the energy production as a result of high-energy waste combustion. It is assumed that successively in 2020, 2025 and 2030 recycling of packaging must achieve levels respectively 60%, 70% and 80%. Specialists, dealing with the issue of waste processing and disposal, agree, that increasing the level of automation and reducing the amount of work carried out manually will increase the efficiency both currently running waste management plants and plants built in the future, and also improve the purity of recyclables. In the case of searching for new solutions, which can improve the processes of sorting the municipal waste and recovering the secondary raw materials, the Computer Vision technology seems to be perspective.
            - paragraph
            - paragraph [ref=e38]:
              - emphasis [ref=e39]:
                - link "Home" [ref=e40] [cursor=pointer]:
                  - /url: "#home"
            - heading "WaDaBa - waste database" [level=3] [ref=e41]
            - text: "We created the research position for acquiring images of waste. It comprise from: the platform, on which are put objects - wastes, the stand with a camera, and two type of light sources: the fluorescent lamp and LED-bulb. Waste were acquisition and photographed by four months in order to collect as the most typical kinds of the municipal waste."
            - generic [ref=e42]:
              - img [ref=e43]
              - text: Fig. 1. Plastics type marks
            - text: "The object were put on the research position and next photographed with first and second type of light. There were series carried out of 10 photographs with differ in the angle of the turnover for every object (in the vertical axis). Next the object was damaged to varying degrees: small, medium and large. For each type of destruction have been made 10 photographs. So considering all variants for every object 40 photographs were taken, multiplying it by the number of objects, 4 000 of photographs were created in the database."
            - text: "The parameters of photographs:"
            - list [ref=e44]:
              - listitem [ref=e45]: size 1920x1277 of pixels
              - listitem [ref=e46]: resolution 300 dpi
              - listitem [ref=e47]: colour palette RBG 24 bits
              - listitem [ref=e48]: file format JPG
            - text: The single images have size about 1 MB, and the entire database of 4 GB. The acquired image have been saved onto the disk under the standardized name determining parameters of acquiring the image and type of waste. Sample images are shown in Fig 2.
            - generic [ref=e49]:
              - img [ref=e50]
              - text: Fig. 2. WaDaBa sample images.
            - text: It was assumed that the name of the each acquired picture should describe of photographed object in a simple form. In this way the easy choice of some iteresting objects will be possible in later stages of the research. For instance, objects with the medium level of damage or all bottles with a screw caps.
            - paragraph [ref=e51]: "It was decided that the name of the photographed object will be coded as follows:"
            - generic [ref=e52]: 0004 a01b05c2d0e1f0g1h1.jpg
            - text: "where first four digits denotes the order number of the object and the next sections (a to h) described its properties such as:"
            - list [ref=e53]:
              - listitem [ref=e54]: "[a] - a number denoting the plastic type;"
              - listitem [ref=e55]: "[b] - colour;"
              - listitem [ref=e56]: "[c] - type of light;"
              - listitem [ref=e57]: "[d] - the deformation level;"
              - listitem [ref=e58]: "[e] - the level of a dirt;"
              - listitem [ref=e59]: "[f] - presence of a screw cap or a lid;"
              - listitem [ref=e60]: "[g] - presence of a ring - characteristic for the bottles with a screw caps;"
              - listitem [ref=e61]: "[h] - order number of a random position of a photographed object."
            - text: We also decided to use characters (as a name of a parameter) and digits (as a parameter value) to make the easier to understand it for the human - quickly, without a computer. In the table 1 the established values of defined parameters are presented.
