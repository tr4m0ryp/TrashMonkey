# Source registry for the dataset download stage.
# Loaded + validated by src/trashmonkey/data/download/registry.py.
# Unknown keys fail fast with the offending key named in the error.
#
# Schema, per entry under `sources` (exact shape other tasks depend on):
#   name:            unique source id; archive contents land in data/raw/<name>/
#   fetcher:
#     kind:          kaggle | http | local
#     ref:           kaggle dataset slug, http(s) URL, or local filesystem path
#     sha256:        hex digest of the fetched archive, or null before the first
#                    real fetch. After fetching, copy the recorded value from
#                    data/raw/<name>/.manifest.json (or run
#                    `shasum -a 256 <archive>`) into this field so later runs
#                    verify against it.
#   license:         SPDX id / short license name (feeds the paper attribution table)
#   attribution:     human-readable credit line for the paper
#   annotation_type: cls | det   (classification folders vs detection boxes)
#   background:      clean | wild (white/plain presentation vs in-the-wild)
#   mapping:         <source_label>: <target_class|DROP>; target classes come from
#                    configs/config.yaml `classes`; DROP routes the label out of
#                    training (remap stage sends it to the wilderness probe set)
#   drops:           optional convenience list of source labels to drop (same
#                    effect as mapping the label to DROP)
#   cap:             optional per-target-class image caps, applied at balancing
#
# Source ORDER below is the cross-dataset dedup priority (T10): on an exact
# pHash duplicate the LATER source's copy is dropped. Do not reorder:
# trashnet > drinking-waste > garbage-detection > alistairking-household > realwaste.
#
# Census verification (T1/T2, F18; re-verified 2026-06-10 via authenticated
# Kaggle metadata/files API and canonical pages):
#   trashnet               -- archive URL resolves (HTTP 200); MIT per repo.
#   drinking-waste         -- kaggle metadata OK; license CC0-1.0 confirmed;
#                             4 classes (AluCan/Glass/HDPEM/PET) per census
#                             file enumeration; ships YOLO labels (YOLO_imgs/).
#   garbage-detection      -- kaggle metadata OK; license CC BY 4.0 confirmed
#                             (also embedded in the dataset's data.yaml, which
#                             credits Roboflow material-identification/
#                             garbage-classification-3 v2); data.yaml names
#                             verified: ['BIODEGRADABLE','CARDBOARD','GLASS',
#                             'METAL','PAPER','PLASTIC'] -- CLOTH (listed in
#                             T1 from the 7-class Roboflow lineage) is ABSENT
#                             from this mirror; its DROP entry is kept as a
#                             defensive no-op.
#   alistairking-household -- kaggle metadata OK; license MIT confirmed; all
#                             30 category folders enumerated via the files
#                             API (15,000 files, 500/category, default +
#                             real_world splits of 250 each).
#   realwaste              -- UCI canonical page confirms CC BY 4.0; direct
#                             zip URL resolves (HTTP 200); 9 labels per UCI
#                             page and Kaggle mirror (joebeachcapital/realwaste).
#
# realwaste is the TEST-1 leave-one-source-out holdout (T6:
# eval.leave_out_source in configs/config.yaml). Its registry entry is normal;
# the split routing happens downstream -- it is ingested but never trained on.

sources:
  - name: trashnet
    fetcher:
      kind: http
      # Canonical archive: the repo distributes dataset-resized.zip in-tree
      # (data/dataset-resized.zip on master); the project has no GitHub
      # releases, so this raw URL is the canonical fetch path.
      ref: https://github.com/garythung/trashnet/raw/master/data/dataset-resized.zip
      # pinned from the 2026-06-10 acceptance fetch (data/raw/trashnet/.manifest.json)
      sha256: 0bf472790f8b20e5c950d5b5012a9d38af0d3392efd65f8ce171334fc16b07c2
    license: MIT
    attribution: >-
      Gary Thung and Mindy Yang, TrashNet (github.com/garythung/trashnet),
      2,527 images at 512x384, single object on white posterboard
    annotation_type: cls
    background: clean
    mapping:
      plastic: plastic     # 482 images (F17)
      paper: paper         # 594
      cardboard: cardboard # 403
      metal: metal         # 410
      glass: glass         # 501
      trash: DROP          # 137 -- maps to none of the six target classes (F17)
    drops: [trash]
    # cls source -> autobox each image. Try BiRefNet salient-object matting first
    # (clean white posterboard => crisp foreground), then Grounding DINO, then the
    # centerbox fallback.
    box_order: [birefnet, dino, centerbox]

  - name: drinking-waste
    fetcher:
      kind: kaggle
      ref: arkadiyhacks/drinking-waste-classification
      # null until the first real fetch -- fill from
      # data/raw/drinking-waste/.manifest.json after
      # `python -m trashmonkey.data.download`.
      sha256: null
    license: CC0-1.0
    attribution: >-
      Arkadiy Serezhkin, Drinking Waste Classification
      (kaggle.com/datasets/arkadiyhacks/drinking-waste-classification),
      4,828 images of drink containers with YOLO boxes, UCL final-year project
    # Ships its own YOLO labels in YOLO_imgs/ -- no autoboxing needed (T1).
    annotation_type: det
    background: clean
    mapping:
      AluCan: metal   # 1,060 images (F18)
      Glass: glass    # 1,232 -- reuses part of TrashNet's glass; dedup catches it (T10)
      PET: plastic    # 1,508 -- resin codes collapse to plastic (T1)
      HDPEM: plastic  # 1,028 -- HDPE milk bottles
    drops: []
    # This source ships NO data.yaml/classes.txt, so the YOLO label class-index
    # order is declared here. Verified 2026-06-14 by reading one label per class
    # in YOLO_imgs/ (filenames encode the class): 0=AluCan 1=Glass 2=HDPEM 3=PET.
    class_names: [AluCan, Glass, HDPEM, PET]

  - name: garbage-detection
    fetcher:
      kind: kaggle
      ref: viswaprakash1990/garbage-detection
      # null until the first real fetch -- fill from
      # data/raw/garbage-detection/.manifest.json after
      # `python -m trashmonkey.data.download`.
      sha256: null
    license: CC BY 4.0
    attribution: >-
      Viswa Prakash, Garbage Detection - 6 Waste Categories
      (kaggle.com/datasets/viswaprakash1990/garbage-detection), Kaggle mirror
      of Roboflow material-identification/garbage-classification-3 v2,
      10,464 detection images with YOLO boxes
    annotation_type: det
    # Roboflow aggregate of unknown provenance, mixed scenes (T2); pHash dedup
    # against earlier sources is load-bearing here (F20, T10).
    background: wild
    # Wild aggregate off the plain-background deployment distribution -- ingested
    # for evaluation only, never trained on (box_order left at the pipeline default).
    role: test_only
    mapping:
      # Exact label spellings from the shipped data.yaml (verified 2026-06-10).
      PAPER: paper
      PLASTIC: plastic
      GLASS: glass
      METAL: metal
      CARDBOARD: cardboard
      BIODEGRADABLE: organic
      # CLOTH comes from the 7-class Roboflow lineage (T1) but is absent from
      # this mirror's data.yaml (nc: 6). Kept as a defensive no-op DROP.
      CLOTH: DROP
    drops: [CLOTH]
    # Per-source per-class caps (T4): clamp this source's pool for a class
    # BEFORE the global 1500/class allocation, so one dominant source cannot
    # monopolise a class's budget. garbage-detection is a ~10k wild Roboflow
    # aggregate (off the plain-background deployment distribution) -- capped to
    # half the global budget so the clean sources (trashnet, drinking-waste)
    # retain representation. organic is omitted: it is a minority class with
    # only two sources, so it must contribute its full post-dedup pool.
    cap:
      plastic: 750
      paper: 750
      cardboard: 750
      metal: 750
      glass: 750

  - name: alistairking-household
    fetcher:
      kind: kaggle
      ref: alistairking/recyclable-and-household-waste-classification
      # null until the first real fetch -- fill from
      # data/raw/alistairking-household/.manifest.json after
      # `python -m trashmonkey.data.download`.
      sha256: null
    license: MIT
    attribution: >-
      Alistair King, Recyclable and Household Waste Classification
      (kaggle.com/datasets/alistairking/recyclable-and-household-waste-classification),
      15,000 images at 256x256 across 30 categories, studio (default) and
      real_world splits of 250 images each
    annotation_type: cls
    # Studio "default" split is clean single-object; real_world is also
    # single-object framing (T2).
    background: clean
    # cls source -> autobox each image. Studio single-object frames matte cleanly,
    # so BiRefNet first, then Grounding DINO, then the centerbox fallback.
    box_order: [birefnet, dino, centerbox]
    mapping:
      # All 30 category folders enumerated via the Kaggle files API
      # (2026-06-10, 500 images each). Mapping is TOTAL over that list (T1):
      # obvious material mappings; non-sortable categories -> DROP.
      aerosol_cans: metal
      aluminum_food_cans: metal
      aluminum_soda_cans: metal
      steel_food_cans: metal
      cardboard_boxes: cardboard
      cardboard_packaging: cardboard
      magazines: paper
      newspaper: paper
      office_paper: paper
      paper_cups: paper
      glass_beverage_bottles: glass
      glass_cosmetic_containers: glass
      glass_food_jars: glass
      disposable_plastic_cutlery: plastic
      plastic_cup_lids: plastic
      plastic_detergent_bottles: plastic
      plastic_food_containers: plastic
      plastic_shopping_bags: plastic
      plastic_soda_bottles: plastic
      plastic_straws: plastic
      plastic_trash_bags: plastic
      plastic_water_bottles: plastic
      styrofoam_cups: plastic       # polystyrene, resin code 6 -- plastic (T1)
      styrofoam_food_containers: plastic
      coffee_grounds: organic
      eggshells: organic
      food_waste: organic
      tea_bags: organic
      clothing: DROP  # textile -- non-sortable, open-set probe pool (T1/T9)
      shoes: DROP     # textile/mixed -- non-sortable, open-set probe pool
    drops: [clothing, shoes]
    # Per-source per-class caps (T4): see garbage-detection above. This source
    # is the largest contributor -- many studio categories collapse onto one
    # target class (12 plastic categories x 500 = 6000 plastic alone), and those
    # within-category studio shots are highly self-similar. Capped to half the
    # global budget so a class is not flooded by near-duplicate studio frames.
    # organic omitted (minority class -- keep its full pool).
    cap:
      plastic: 750
      paper: 750
      cardboard: 750
      metal: 750
      glass: 750

  - name: realwaste
    fetcher:
      kind: http
      # UCI canonical archive (preferred over the Kaggle mirror
      # joebeachcapital/realwaste): direct static zip, verified HTTP 200.
      ref: https://archive.ics.uci.edu/static/public/908/realwaste.zip
      # null until the first real fetch -- fill from
      # data/raw/realwaste/.manifest.json after
      # `python -m trashmonkey.data.download`.
      sha256: null
    license: CC BY 4.0
    attribution: >-
      Sam Single, Saeid Iranmanesh, and Raad Raad, RealWaste (UCI Machine
      Learning Repository, dataset 908), 4,752 images at 524x524 of waste
      items at the point of landfill reception, 9 material labels
    annotation_type: cls
    # Real landfill environment, degraded items, single-item framing (T2).
    background: wild
    # TEST-1 holdout: ingested but never trained on; routing handled by
    # eval.leave_out_source in configs/config.yaml (T6).
    mapping:
      Cardboard: cardboard      # 461 images (UCI page)
      Glass: glass              # 420
      Metal: metal              # 790
      Paper: paper              # 500
      Plastic: plastic          # 921
      "Food Organics": organic  # 411 -- food/vegetation collapse to organic (T1)
      Vegetation: organic       # 436
      "Miscellaneous Trash": DROP # 495 -- none of the six; open-set probe pool
      "Textile Trash": DROP       # 318
    drops: ["Miscellaneous Trash", "Textile Trash"]
