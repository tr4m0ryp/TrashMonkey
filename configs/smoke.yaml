# Smoke-test profile (task 016): a COMPLETE standalone config.
#
# The typed loader (utils/config) validates one file against the full schema
# and has NO overlay support, so this file mirrors configs/config.yaml key for
# key with smoke-sized values. The smoke harness (yolo_waste_sorter.smoke)
# rewrites `paths` into a throwaway workdir at runtime; the relative values
# below only matter if this file is loaded directly (they stay clear of the
# real data/ tree).
#
# QA gate note: the T3 acceptance metrics (review/localization fail rates,
# median IoU) come from HUMAN review and are always pending in-pipeline, so no
# config can make the gate pass -- the harness runs with ack_review=True (the
# --ack-review path), which is the gate's documented continue mechanism.
seed: 42

paths:
  raw: data/smoke/raw
  interim: data/smoke/interim
  processed: data/smoke/processed
  external: data/smoke/external
  models: models
  reports: reports

experiment:
  name: smoke

model:
  base: yolo11n.pt
  imgsz: 160

classes:
  - plastic
  - paper
  - cardboard
  - metal
  - glass
  - organic

# T7 recipe shape preserved (AdamW pinned, cache disk, fixed batch); sizes are
# smoke-tiny. train() in smoke mode additionally forces the contract-pinned
# SMOKE_OVERRIDES (epochs=1, batch=2, imgsz=160, device=cpu, workers=0).
train:
  epochs: 1
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01
  momentum: 0.9
  weight_decay: 0.0005
  warmup_epochs: 0.0
  batch: 2
  imgsz: 160
  patience: 1
  close_mosaic: 0
  cache: disk
  amp: false
  deterministic: true
  freeze: null
  workers: 0

augment:
  degrees: 180
  flipud: 0.5
  fliplr: 0.5
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.5
  translate: 0.1
  scale: 0.5
  mosaic: 0.0
  mixup: 0.0
  cutmix: 0.0
  shear: 0.0
  perspective: 0.0
  copy_paste: 0.0
  esp32_stack:
    image_compression:
      quality_range: [50, 85]
      p: 0.5
    iso_noise:
      p: 0.3
    gauss_noise:
      p: 0.2
    motion_blur:
      blur_limit: [3, 7]
      p: 0.3
    defocus:
      radius: [1, 3]
      p: 0.1
    planckian_jitter:
      p: 0.3
    downscale:
      scale_range: [0.4, 0.75]
      p: 0.3
    random_brightness_contrast:
      p: 0.2

# beta is the second fixture source: leaving it out exercises the TEST-1
# (leave-one-source-out) split logic end to end. val_fraction 0.5 sizes the
# val split for the tiny fixture pool (4 images per class from alpha).
# TEST-2 runs at severity 1 only.
eval:
  val_fraction: 0.5
  leave_out_source: beta
  test2_severities: [1]

# Reduced 2x2x1 sweep grid; conf_floor relaxed to 0.05 so a 1-epoch CPU run
# still dumps detections for the tuner on the real-model path.
thresholds:
  conf_floor: 0.05
  tau_frame: 0.40
  min_votes: 1
  high_water: 0.80
  sweep:
    tau_frame: [0.4, 0.6]
    min_votes: [1, 2]
    high_water: [0.8]
